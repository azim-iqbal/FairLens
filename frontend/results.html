<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairLens - Results</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<header>
    <h1>FairLens</h1>
    <nav>
        <a href="/">Upload</a>
    </nav>
</header>

<div class="container" id="loadingView">
    <h2>Running Audit...</h2>
</div>

<div class="container hidden" id="resultsView">
    <h2>Audit Results</h2>
    <p><strong>Dataset:</strong> <span id="filenameSpan"></span></p>

    <div class="card">
        <h3>Disparate Impact Ratio</h3>
        <canvas id="dirChart"></canvas>
    </div>

    <div class="card">
        <h3>Feature Influence</h3>
        <canvas id="fiChart"></canvas>
    </div>

    <button id="runFixBtn">Apply Fix</button>
</div>

<script>
const fileId = localStorage.getItem('currentFileId');
const filename = localStorage.getItem('currentFilename');
const filepath = localStorage.getItem('currentFilePath');

const sensitiveCols = JSON.parse(localStorage.getItem('sensitiveCols') || '[]');
const outcomeCol = localStorage.getItem('outcomeCol') || "";
const favorableOutcome = localStorage.getItem('favorableOutcome') || "Yes";

document.getElementById('filenameSpan').innerText = filename || "Unknown";

async function runAuditFlow() {
    if (!fileId || !filepath) {
        alert("Missing file info");
        window.location.href = "/";
        return;
    }

    try {
        const res = await fetch('/audit/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                file_id: fileId,
                filename: filename,
                filepath: filepath,
                sensitive_columns: sensitiveCols,
                outcome_column: outcomeCol,
                favorable_value: favorableOutcome
            })
        });

        const data = await res.json();

        if (data.mode !== "full_audit") {
            alert("Audit not completed properly.");
            return;
        }

        document.getElementById('loadingView').classList.add('hidden');
        document.getElementById('resultsView').classList.remove('hidden');

        renderMetrics(data.metrics);

    } catch (err) {
        console.error(err);
        alert("Audit failed");
    }
}

function renderMetrics(metrics) {
    // Disparate Impact
    const dirCtx = document.getElementById('dirChart').getContext('2d');

    const labels = Object.keys(metrics.disparate_impact_ratio || {});
    const values = Object.values(metrics.disparate_impact_ratio || {});

    new Chart(dirCtx, {
        type: 'bar',
        data: {
            labels: labels.length ? labels : ['N/A'],
            datasets: [{
                label: 'DIR',
                data: values.length ? values : [0],
            }]
        }
    });

    // Feature Influence
    const fiCtx = document.getElementById('fiChart').getContext('2d');

    const fiKeys = Object.keys(metrics.feature_influence || {});
    const fiVals = Object.values(metrics.feature_influence || {});

    new Chart(fiCtx, {
        type: 'bar',
        data: {
            labels: fiKeys,
            datasets: [{
                label: 'Influence',
                data: fiVals
            }]
        }
    });
}

// FIX BUTTON (basic working)
document.getElementById('runFixBtn').addEventListener('click', async () => {
    try {
        const res = await fetch('/fix/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                file_id: fileId,
                filepath: filepath,
                sensitive_columns: sensitiveCols,
                outcome_column: outcomeCol,
                favorable_outcome: favorableOutcome,
                privileged_groups: {}
            })
        });

        const data = await res.json();
        alert("Fix applied successfully");

    } catch (err) {
        console.error(err);
        alert("Fix failed");
    }
});

// Run on load
runAuditFlow();
</script>
</body>
</html>
